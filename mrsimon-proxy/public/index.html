<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Simon – Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .logo {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 16px; font-weight: 600; color: #111; }
    .header-text p  { font-size: 13px; color: #888; margin-top: 2px; }

    .nps-section {
      background: #f9f8f5;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .nps-section h3 { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .nps-section .sub { font-size: 13px; color: #888; margin-bottom: 1rem; }

    .nps-scale { display: flex; gap: 5px; flex-wrap: wrap; }

    .nps-btn {
      width: 46px; height: 46px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .nps-btn:hover { border-color: #aaa; background: #f5f4f0; }
    .nps-btn.selected.detractor { background: #E24B4A; border-color: #E24B4A; color: #fff; }
    .nps-btn.selected.passive   { background: #EF9F27; border-color: #EF9F27; color: #fff; }
    .nps-btn.selected.promoter  { background: #1D9E75; border-color: #1D9E75; color: #fff; }

    .nps-labels {
      display: flex; justify-content: space-between;
      margin-top: 6px;
      font-size: 11px; color: #aaa;
    }

    .nps-confirm {
      margin-top: 1rem;
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: none;
      font-family: inherit;
    }
    .nps-confirm:hover { background: #333; }

    #chat-section { display: none; }

    .progress { display: flex; gap: 6px; margin-bottom: 1.25rem; align-items: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
    .step-dot.done   { background: #1d4ed8; }
    .step-dot.active { background: #111; }
    .progress-label { font-size: 12px; color: #aaa; margin-left: 6px; }

    .chat-thread { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .avatar.ai   { background: #dbeafe; color: #1d4ed8; }
    .avatar.user { background: #f0f0f0; color: #555; border: 1px solid #e0e0e0; }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #111;
    }
    .bubble.ai   { background: #f5f4f0; border: 1px solid rgba(0,0,0,0.06); border-top-left-radius: 4px; }
    .bubble.user { background: #dbeafe; color: #1e3a8a; border-top-right-radius: 4px; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 12px;
      font-size: 14px; font-family: inherit; color: #111;
      background: #fff; resize: none;
      min-height: 44px; max-height: 120px; line-height: 1.5; outline: none;
    }
    textarea:focus { border-color: #999; }
    textarea::placeholder { color: #bbb; }

    #send {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; background: #111; color: #fff;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send:disabled { opacity: 0.3; cursor: not-allowed; }

    .summary-card {
      background: #f9f8f5; border: 1px solid rgba(0,0,0,0.07);
      border-radius: 12px; padding: 1.25rem; margin-top: 0.5rem;
    }
    .summary-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #111; }
    .insight { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; font-size: 13px; line-height: 1.5; color: #555; }
    .insight-dot { width: 6px; height: 6px; border-radius: 50%; background: #1d4ed8; flex-shrink: 0; margin-top: 5px; }

    button.restart {
      margin-top: 1rem; padding: 8px 16px;
      border: 1px solid #ddd; border-radius: 8px;
      background: transparent; color: #777;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }
    button.restart:hover { background: #f0f0f0; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">MS</div>
    <div class="header-text">
      <h1>Mr. Simon feedback</h1>
      <p>Help us improve your interview prep experience</p>
    </div>
  </div>

  <div class="nps-section" id="nps-section">
    <h3>How likely are you to recommend Mr. Simon to a friend or colleague?</h3>
    <p class="sub">0 = not at all likely &nbsp;·&nbsp; 10 = extremely likely</p>
    <div class="nps-scale" id="nps-scale"></div>
    <div class="nps-labels"><span>Not likely</span><span>Extremely likely</span></div>
    <button class="nps-confirm" id="nps-confirm">Confirm score</button>
  </div>

  <div id="chat-section">
    <div class="progress" id="progress"></div>
    <div class="chat-thread" id="chat"></div>
    <div class="input-row" id="input-area">
      <textarea id="user-input" placeholder="Share your thoughts..." rows="1"></textarea>
      <button id="send">↑</button>
    </div>
  </div>
</div>

<script>
  const TOTAL_QUESTIONS = 6;
  let npsScore = null;
  let history = [];
  let exchangeCount = 0;
  let isLoading = false;

  // When deployed, this file is served from the same server as the proxy,
  // so we can use a relative URL — no hardcoded domain needed.
  const API_URL = '/api/chat';

  const npsSection  = document.getElementById('nps-section');
  const chatSection = document.getElementById('chat-section');
  const chat        = document.getElementById('chat');
  const input       = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send');
  const progress    = document.getElementById('progress');
  const inputArea   = document.getElementById('input-area');
  const npsScale    = document.getElementById('nps-scale');
  const npsConfirm  = document.getElementById('nps-confirm');

  for (let i = 0; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'nps-btn ' + (i <= 6 ? 'detractor' : i <= 8 ? 'passive' : 'promoter');
    btn.textContent = i;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nps-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      npsScore = i;
      npsConfirm.style.display = 'inline-block';
    });
    npsScale.appendChild(btn);
  }

  npsConfirm.addEventListener('click', () => {
    npsSection.style.display = 'none';
    chatSection.style.display = 'block';
    updateProgress();
    initChat();
  });

  function getSegment(s) { return s <= 6 ? 'detractor' : s <= 8 ? 'passive' : 'promoter'; }

  function getSystemPrompt() {
    const seg = getSegment(npsScore);
    const ctx = seg === 'promoter'
      ? `The user gave an NPS score of ${npsScore}/10 — they are a PROMOTER. Dig into what they love most and what drove that high score.`
      : seg === 'passive'
      ? `The user gave an NPS score of ${npsScore}/10 — they are a PASSIVE. Focus on uncovering what's holding them back from being a strong advocate.`
      : `The user gave an NPS score of ${npsScore}/10 — they are a DETRACTOR. Be empathetic and dig into their frustrations and unmet expectations.`;

    return `You are a warm, curious product researcher collecting feedback for Mr. Simon.AI — an AI-powered virtual career coach that helps job seekers prepare for interviews through mock interview practice, soft-skills coaching, and personalized guidance.\n\n${ctx}\n\nExplore: what brought them to Mr. Simon, the mock interview experience, quality of AI feedback, confidence building, gaps or frustrations, and likelihood to recommend.\n\nRules:\n- ONE question per message.\n- Be conversational and warm.\n- SHORT messages: 1–3 sentences. Acknowledge first, then ask.\n- Probe the WHY behind every answer.\n- After ${TOTAL_QUESTIONS} user exchanges respond ONLY with raw JSON:\n{"done": true, "nps": ${npsScore}, "segment": "${seg}", "insights": ["insight 1","insight 2","insight 3","insight 4","insight 5"]}\nInsights must be specific and actionable.\n\nStart by warmly acknowledging their score and asking your first open-ended question.`;
  }

  function updateProgress() {
    progress.innerHTML = '';
    for (let i = 0; i < TOTAL_QUESTIONS; i++) {
      const d = document.createElement('div');
      d.className = 'step-dot' + (i < exchangeCount ? ' done' : i === exchangeCount ? ' active' : '');
      progress.appendChild(d);
    }
    const lbl = document.createElement('span');
    lbl.className = 'progress-label';
    lbl.textContent = exchangeCount < TOTAL_QUESTIONS ? `Question ${Math.min(exchangeCount+1, TOTAL_QUESTIONS)} of ${TOTAL_QUESTIONS}` : 'Complete';
    progress.appendChild(lbl);
  }

  function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const av  = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'ai' ? 'MS' : 'You';
    const bub = document.createElement('div');
    bub.className = `bubble ${role}`;
    bub.textContent = text;
    msg.appendChild(av);
    msg.appendChild(bub);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg'; el.id = 'typing-indicator';
    el.innerHTML = '<div class="avatar ai">MS</div><div class="bubble ai typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

  function scoreColor(s) {
    if (s <= 6) return { bg: '#fee2e2', color: '#991b1b' };
    if (s <= 8) return { bg: '#fef3c7', color: '#92400e' };
    return { bg: '#d1fae5', color: '#065f46' };
  }

  function showSummary(insights, score, segment) {
    inputArea.style.display = 'none';
    const c = scoreColor(score);
    const label = segment === 'promoter' ? 'Promoter' : segment === 'passive' ? 'Passive' : 'Detractor';
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="font-size:24px;font-weight:700;color:${c.color}">${score}</span>
      <span style="font-size:12px;padding:3px 10px;border-radius:99px;background:${c.bg};color:${c.color};font-weight:600">${label}</span>
    </div>
    <h3>Key insights from this user</h3>` +
      insights.map(i => `<div class="insight"><div class="insight-dot"></div><span>${i}</span></div>`).join('') +
      `<button class="restart" onclick="location.reload()">Start a new session</button>`;
    chat.appendChild(card);
    chat.scrollTop = chat.scrollHeight;
  }

  async function callProxy(userMessage) {
    if (userMessage) history.push({ role: 'user', content: userMessage });
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: getSystemPrompt(),
        messages: history
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : data.error.message);
    return data.content.map(b => b.text || '').join('').trim();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    isLoading = true; sendBtn.disabled = true;
    input.value = ''; input.style.height = 'auto';
    addMessage('user', text);
    exchangeCount++; updateProgress();
    showTyping();
    try {
      const reply = await callProxy(text);
      hideTyping();
      try {
        const parsed = JSON.parse(reply);
        if (parsed.done && parsed.insights) {
          addMessage('ai', "Thank you so much — this is genuinely helpful. Here's a summary of what you shared:");
          showSummary(parsed.insights, parsed.nps, parsed.segment);
          return;
        }
      } catch(e) {}
      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    } catch(e) {
      hideTyping();
      addMessage('ai', 'Something went wrong: ' + e.message);
    }
    isLoading = false; sendBtn.disabled = false; input.focus();
  }

  async function initChat() {
    sendBtn.disabled = true; showTyping();
    try {
      const opening = await callProxy(null);
      hideTyping();
      history.push({ role: 'assistant', content: opening });
      addMessage('ai', opening);
    } catch(e) {
      hideTyping();
      addMessage('ai', `Thanks for that score! What first brought you to Mr. Simon?`);
    }
    sendBtn.disabled = false; input.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
</script>
</body>
</html>
